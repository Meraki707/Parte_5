<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
    body{
        text-align:center;
    }

    .a{
        border:1px solid black;
        margin-left:650px;
        margin-right:650px;
        margin-top:100px;
        background-color:gray;
        border-radius:10px;
        padding-bottom:20px;
    }

    #mensagemErro{
        color:red;
    }

</style>
</head>
<body>

<div class="a">
    <h1>LOGIN</h1>
    <input type="text" id="u" placeholder="usuario">
    <br><br>
    <input type="password" id="s" placeholder="senha">
    <br><br>
    <button onclick="validarLogin()">Entrar</button>
    <p id="mensagemErro"></p>
</div>

<script>
    function validarLogin(){
        //adicionado o var mensagemErro, e alterado o nome das variáveis com letras
        var usuario = document.getElementById("u").value
        var senha = document.getElementById("s").value 
        var mensagem = document.getElementById("mensagemErro")
        
         // validação de campos vazios
        if (usuario === "" || senha === "") {
            mensagem.innerHTML = "Campos vazios não são permitidos."
            return
        }
        if(usuario == "admin" && senha == "123"){
            alert("Login feito com sucesso")
            mensagem.innerHTML = "Login realizado com sucesso!"
            window.location = "page.html"
        }else{
            document.getElementById("mensagemErro").innerHTML = "Erro ao entrar Usuário ou senha inválidos."
        }
    }

</script>

</body>
</html>
